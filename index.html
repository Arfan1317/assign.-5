<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans text-gray-800">

    <div class="bg-white border border-gray-100 rounded-xl shadow-sm w-full max-w-[520px] p-8 sm:p-10 m-4">
        
        <div class="flex justify-center mb-4">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16">
        </div>

        <h1 class="text-2xl font-bold text-center text-gray-900 mb-1">GitHub Issues Tracker</h1>
        <p class="text-center text-gray-500 text-sm mb-8">Sign in to manage your issues</p>

        <form id="loginForm">
            <div class="mb-5">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Enter Username" 
                    class="w-full border border-gray-300 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#5200FF] focus:border-transparent transition-colors"
                    required
                >
                <p class="text-[12px] text-[#5200FF] mt-1">Default: admin</p>
            </div>

            <div class="mb-6">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter Password" 
                    class="w-full border border-gray-300 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#5200FF] focus:border-transparent transition-colors"
                    required
                >
                <p class="text-[12px] text-[#5200FF] mt-1">Default: admin123</p>
            </div>

            <button 
                type="submit" 
                class="w-full bg-[#5200FF] hover:bg-[#4300d1] text-white font-semibold py-3 rounded-md transition-colors"
            >
                Sign In
            </button>
        </form>

        <div class="flex items-center my-6">
            <hr class="flex-grow border-gray-200">
            <span class="px-4 text-gray-400 text-sm">OR</span>
            <hr class="flex-grow border-gray-200">
        </div>

        <div class="text-center text-sm text-gray-500 mb-3">
            Demo Credentials:
        </div>
        <div class="bg-gray-50 rounded-lg p-5 text-center text-sm text-gray-700 border border-gray-100">
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
        </div>

    </div>
    <script src="index.js"></script>
</body>
</html>
