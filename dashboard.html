<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <nav class="bg-white border-b border-gray-200 px-4 sm:px-6 py-3 flex flex-col sm:flex-row justify-between items-center sticky top-0 z-10 gap-3 sm:gap-0">
        <div class="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-start">
            <img src="./assets/github-logo.png" alt="Logo" class="w-8 h-8">
            <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
        </div>
        <div class="flex items-center gap-3 w-full sm:w-auto mt-2 sm:mt-0">
            <div class="relative w-full sm:w-64">
                <svg class="w-4 h-4 absolute left-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search issues..." class="w-full pl-9 pr-4 py-2 sm:py-1.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#5200FF]">
            </div>
            <button class="bg-[#5200FF] hover:bg-[#4300d1] text-white text-sm font-medium px-4 py-2 rounded-md whitespace-nowrap transition-colors">
                + New Issue
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-6 sm:py-8">
        
        <div class="bg-white rounded-lg border border-gray-200 p-2 sm:p-4 mb-6 flex overflow-x-auto sm:flex-wrap gap-2 sm:gap-3 shadow-sm">
            <button id="tab-all" class="tab-btn active px-6 sm:px-8 py-2 rounded-md text-sm font-medium bg-[#5200FF] text-white transition-colors whitespace-nowrap" onclick="filterIssues('all')">All</button>
            <button id="tab-open" class="tab-btn px-6 sm:px-8 py-2 rounded-md text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors whitespace-nowrap" onclick="filterIssues('open')">Open</button>
            <button id="tab-closed" class="tab-btn px-6 sm:px-8 py-2 rounded-md text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors whitespace-nowrap" onclick="filterIssues('closed')">Closed</button>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 p-4 sm:p-8 shadow-sm">
            
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-8 gap-4 sm:gap-0">
                <div class="flex items-center gap-3 sm:gap-4">
                    <img src="./assets/Aperture.png" alt="Icon" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-purple-50 p-2">
                    <div>
                        <h2 class="font-bold text-lg sm:text-xl leading-tight text-gray-900"><span id="issueCount">0</span> Issues</h2>
                        <p class="text-xs sm:text-sm text-gray-500 mt-0.5">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 sm:gap-5 text-xs sm:text-sm font-medium text-gray-700">
                    <div class="flex items-center gap-1.5 sm:gap-2"><span class="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-full bg-[#23c961]"></span> Open</div>
                    <div class="flex items-center gap-1.5 sm:gap-2"><span class="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-full bg-[#9b51e0]"></span> Closed</div>
                </div>
            </div>

            <div id="loadingSpinner" class="hidden flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#5200FF]"></div>
                <p class="text-gray-500 mt-3 text-sm">Loading issues...</p>
            </div>

            <div id="issuesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
                </div>
        </div>
    </main>
</body>
</html>
