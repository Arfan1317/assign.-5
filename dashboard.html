<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <nav class="bg-white border-b border-gray-200 px-4 sm:px-6 py-3 flex flex-col sm:flex-row justify-between items-center sticky top-0 z-10 gap-3 sm:gap-0">
        <div class="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-start">
            <img src="./assets/github-logo.png" alt="Logo" class="w-8 h-8">
            <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
        </div>
        <div class="flex items-center gap-3 w-full sm:w-auto mt-2 sm:mt-0">
            <div class="relative w-full sm:w-64">
                <svg class="w-4 h-4 absolute left-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search issues..." class="w-full pl-9 pr-4 py-2 sm:py-1.5 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#5200FF]">
            </div>
            <button class="bg-[#5200FF] hover:bg-[#4300d1] text-white text-sm font-medium px-4 py-2 rounded-md whitespace-nowrap transition-colors">
                + New Issue
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-6 sm:py-8">
        
        <div class="bg-white rounded-lg border border-gray-200 p-2 sm:p-4 mb-6 flex overflow-x-auto sm:flex-wrap gap-2 sm:gap-3 shadow-sm">
            <button id="tab-all" class="tab-btn active px-6 sm:px-8 py-2 rounded-md text-sm font-medium bg-[#5200FF] text-white transition-colors whitespace-nowrap" onclick="filterIssues('all')">All</button>
            <button id="tab-open" class="tab-btn px-6 sm:px-8 py-2 rounded-md text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors whitespace-nowrap" onclick="filterIssues('open')">Open</button>
            <button id="tab-closed" class="tab-btn px-6 sm:px-8 py-2 rounded-md text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors whitespace-nowrap" onclick="filterIssues('closed')">Closed</button>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 p-4 sm:p-8 shadow-sm">
            
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-8 gap-4 sm:gap-0">
                <div class="flex items-center gap-3 sm:gap-4">
                    <img src="./assets/Aperture.png" alt="Icon" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-purple-50 p-2">
                    <div>
                        <h2 class="font-bold text-lg sm:text-xl leading-tight text-gray-900"><span id="issueCount">0</span> Issues</h2>
                        <p class="text-xs sm:text-sm text-gray-500 mt-0.5">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 sm:gap-5 text-xs sm:text-sm font-medium text-gray-700">
                    <div class="flex items-center gap-1.5 sm:gap-2"><span class="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-full bg-[#23c961]"></span> Open</div>
                    <div class="flex items-center gap-1.5 sm:gap-2"><span class="w-2.5 h-2.5 sm:w-3 sm:h-3 rounded-full bg-[#9b51e0]"></span> Closed</div>
                </div>
            </div>

            <div id="loadingSpinner" class="hidden flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#5200FF]"></div>
                <p class="text-gray-500 mt-3 text-sm">Loading issues...</p>
            </div>

            <div id="issuesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
                </div>
        </div>
    </main>
    
    <script>
        let allIssuesData = []; 
        let currentTab = 'all';

        // --- API CONNECTION POINTS ---
        const API_ALL = 'https://phi-lab-server.vercel.app/api/v1/lab/issues';
        const API_SEARCH = 'https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=';

        document.addEventListener('DOMContentLoaded', () => {
            fetchIssues(API_ALL);
        });

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const searchText = e.target.value.trim();
                if (searchText) {
                    fetchIssues(API_SEARCH + encodeURIComponent(searchText));
                } else {
                    fetchIssues(API_ALL);
                }
            }
        });

        async function fetchIssues(url) {
            const spinner = document.getElementById('loadingSpinner');
            const grid = document.getElementById('issuesGrid');
            
            spinner.classList.remove('hidden');
            grid.innerHTML = ''; 

            try {
                const response = await fetch(url);
                const data = await response.json();
                allIssuesData = Array.isArray(data) ? data : (data.data || data.issues || []);
                filterIssues(currentTab);
            } catch (error) {
                console.error('Error fetching issues:', error);
                grid.innerHTML = `<p class="text-red-500 text-center col-span-full">Failed to load issues.</p>`;
            } finally {
                spinner.classList.add('hidden');
            }
        }

        function filterIssues(status) {
            currentTab = status;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-[#5200FF]', 'text-white', 'border-transparent');
                btn.classList.add('bg-white', 'text-gray-600', 'border-gray-200');
            });
            const activeBtn = document.getElementById(`tab-${status}`);
            activeBtn.classList.remove('bg-white', 'text-gray-600', 'border-gray-200');
            activeBtn.classList.add('bg-[#5200FF]', 'text-white', 'border-transparent');

            let filteredData = allIssuesData;
            if (status !== 'all') {
                filteredData = allIssuesData.filter(issue => issue.status && issue.status.toLowerCase() === status);
            }

            renderIssues(filteredData);
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown Date';
            const date = new Date(dateString);
            return `${date.getMonth() + 1}/${date.getDate()}/${date.getFullYear()}`;
        }

        function getPriorityStyle(priority) {
            const p = (priority || '').toLowerCase();
            if (p === 'high') return 'bg-red-50 text-red-500';
            if (p === 'medium') return 'bg-amber-50 text-amber-500';
            if (p === 'low') return 'bg-gray-100 text-gray-500';
            return 'bg-gray-100 text-gray-500';
        }

        function getLabelStyle(label) {
            const l = (label || '').toLowerCase();
            if (l === 'bug') return 'text-red-500 bg-red-50 border-red-200';
            if (l === 'help wanted') return 'text-amber-600 bg-amber-50 border-amber-300';
            if (l === 'enhancement') return 'text-emerald-600 bg-emerald-50 border-emerald-200';
            return 'text-purple-600 bg-purple-50 border-purple-200';
        }

        function renderIssues(issues) {
            const grid = document.getElementById('issuesGrid');
            document.getElementById('issueCount').innerText = issues.length;
            grid.innerHTML = '';

            if (issues.length === 0) {
                grid.innerHTML = `<p class="text-gray-500 text-center col-span-full py-10">No issues found.</p>`;
                return;
            }

            issues.forEach(issue => {
                const isClosed = issue.status && issue.status.toLowerCase() === 'closed';
                const borderClass = isClosed ? 'border-t-[#9b51e0]' : 'border-t-[#23c961]';
                const statusIcon = isClosed ? 'Closed- Status .png' : 'Open-Status.png';
                
                let labelsHtml = '';
                if (issue.labels && Array.isArray(issue.labels)) {
                    labelsHtml = issue.labels.map(label => 
                        `<span class="text-[10px] font-bold px-2.5 py-1 rounded-full border uppercase ${getLabelStyle(label)} whitespace-nowrap">${label}</span>`
                    ).join('');
                }

                const card = document.createElement('div');
                card.className = `bg-white rounded-lg shadow-sm border border-gray-200 border-t-4 ${borderClass} flex flex-col justify-between hover:shadow-md transition-shadow cursor-pointer h-full`;
                card.dataset.id = issue._id || issue.id; 
                
                card.innerHTML = `
                    <div class="p-4 sm:p-5 pb-3 sm:pb-4 flex-grow">
                        <div class="flex justify-between items-start mb-3 sm:mb-4">
                            <img src="./assets/${statusIcon}" alt="${issue.status}" class="w-5 h-5 sm:w-6 sm:h-6">
                            <span class="text-[9px] sm:text-[10px] font-bold px-3 py-1 rounded-full uppercase ${getPriorityStyle(issue.priority)}">
                                ${issue.priority || 'Medium'}
                            </span>
                        </div>
                        
                        <h3 class="font-bold text-gray-900 text-[14px] sm:text-[15px] leading-tight mb-2">${issue.title || 'Untitled Issue'}</h3>
                        <p class="text-[12px] sm:text-[13px] text-gray-500 line-clamp-2 mb-3 sm:mb-4">${issue.description || 'No description provided.'}</p>
                        
                        <div class="flex flex-wrap gap-1.5 sm:gap-2">
                            ${labelsHtml}
                        </div>
                    </div>
                    
                    <div class="border-t border-gray-200 px-4 sm:px-5 py-2.5 sm:py-3 bg-white rounded-b-lg">
                        <div class="text-[12px] sm:text-[13px] text-gray-500">
                            <p class="mb-0.5 sm:mb-1">#${issue._id ? issue._id.substring(0,5) : (issue.id || '1')} by ${issue.author || 'Unknown'}</p>
                            <p>${formatDate(issue.createdAt)}</p>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    alert(`Card Clicked! We will fetch details for Issue ID: ${card.dataset.id} next.`);
                });

                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
